      --font-mono: "IBM Plex Mono", ui-monospace, monospace;

    *::before,
    *::after {

    }

    html {
      scroll-behavior: smooth;
    }

    body {

    .prose a:not(.link-pill):not(.work-block .title a),
    .prose a.contact-link {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-color: rgba(255, 255, 255, 0.35);
      text-underline-offset: 0.22em;

      text-decoration-color: rgba(255, 255, 255, 0.75);
    }

      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }

      .shell {
        padding: 0 2rem 5rem;
      }

      top: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line-soft);
    }

    .header__bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: calc(var(--col-width) + 3rem);
      margin: 0 auto;
      padding: 0.85rem 1.25rem;
      box-sizing: border-box;

    @media (min-width: 640px) {
      .header__bar {
        padding: 0.85rem 2rem;
      }

    .wordmark {
      font-family: var(--font-mono);
      font-size: 0.68rem;

      letter-spacing: 0.04em;

      color: var(--muted);
      text-decoration: none;
      line-height: 1.35;
      max-width: min(72%, 16rem);
      word-break: break-word;
    }

    @media (min-width: 480px) {
      .wordmark {
        max-width: none;
      }
    }

    .wordmark:hover {
      color: var(--fg);
    }

    .lang {
      display: inline-flex;
      align-items: stretch;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: transparent;
      padding: 2px;
      gap: 2px;
    }

    .lang button {
      appearance: none;
      margin: 0;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      font: inherit;
      transition: color 0.15s ease, background 0.15s ease;

    .lang button[aria-pressed="true"] {
      background: var(--fg);
      color: var(--bg);
    }

      outline: 2px solid var(--fg);

    }

      transition: text-shadow 0.4s ease;

      letter-spacing: -0.006em;

      function fillList(el, key, lang) {
        const items = DATA[lang][key];
        if (!items || !el) return;
        el.innerHTML = items.map(function (t) {
          return "<li>" + t + "</li>";
        }).join("");
      }

      function applyLang(lang) {
        document.documentElement.lang = lang === "ru" ? "ru" : "en";
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var k = el.getAttribute("data-i18n");
          if (DATA[lang][k] !== undefined) el.textContent = DATA[lang][k];
        });
        document.querySelectorAll("[data-i18n-list]").forEach(function (el) {
          fillList(el, el.getAttribute("data-i18n-list"), lang);
        });
        fillList(document.getElementById("hero-facts"), "hero.facts", lang);

        document.getElementById("btn-en").setAttribute("aria-pressed", lang === "en" ? "true" : "false");
        document.getElementById("btn-ru").setAttribute("aria-pressed", lang === "ru" ? "true" : "false");

        try {
          localStorage.setItem("siteLang", lang);
        } catch (e) {}
      }

      var stored = null;
      try {
        stored = localStorage.getItem("siteLang");
      } catch (e) {}

      var initial = stored === "ru" || stored === "en" ? stored : (navigator.language && navigator.language.toLowerCase().startsWith("ru") ? "ru" : "en");
      applyLang(initial);

      document.getElementById("btn-en").addEventListener("click", function () {
        applyLang("en");
      });
      document.getElementById("btn-ru").addEventListener("click", function () {
        applyLang("ru");
      });
    })();
